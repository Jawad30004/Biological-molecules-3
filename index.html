<html lang="en">
<head>
    <meta charset="UTF-8">

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Config for Branding Colors -->

        tailwind.config = {

                extend: {
                    colors: {
                        brand: {

    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- jsPDF and AutoTable for PDF Generation -->

    <script src="https://unpkg.com/lucide@latest"></script>

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);

        /* Custom Scrollbar */

        ::-webkit-scrollbar-track {
            background: #f1f5f9; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }

        .scientific-text {
            font-family: inherit;

<body class="no-select" oncontextmenu="return false;">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- QUIZ DATA ---
        // Exactly 30 MCQs strictly based on the provided images (Nucleic Acids, Nucleotides, RNA types)
        const quizQuestions = [
            {
                id: 1,
                question: "What are the fundamental monomeric units of nucleic acids (DNA, RNA)?",
                options: ["Nucleosides", "Nucleotides", "Polypeptides", "Fatty acids"],
                correct: 1,
                explanation: "Nucleotides are the fundamental monomeric units of nucleic acids, consisting of a nitrogenous base, a pentose sugar, and a phosphate group.",
                difficulty: "Easy"
            },
            {
                id: 2,
                question: "Which of the following nitrogenous bases is a purine consisting of a nine-membered double ring?",
                options: ["Cytosine", "Uracil", "Adenine", "Thymine"],
                correct: 2,
                explanation: "Adenine is a purine, which consists of two joined carbon-nitrogen rings (a nine-membered double ring). Cytosine, Uracil, and Thymine are pyrimidines.",
                difficulty: "Easy"
            },
            {
                id: 3,
                question: "At which position do pyrimidines covalently attach to the C-1' of the pentose sugar to form a β-N-glycosidic bond?",
                options: ["N-1 position", "N-3 position", "N-7 position", "N-9 position"],
                correct: 0,
                explanation: "Pyrimidines attach to the pentose sugar at the N-1 position, whereas purines attach at the N-9 position.",
                difficulty: "Moderate"
            },
            {
                id: 4,
                question: "What structural difference distinguishes Thymine from Uracil?",
                options: ["Thymine has an extra hydroxyl group.", "Thymine has a methyl group absent in Uracil.", "Uracil has a double ring structure.", "Thymine lacks oxygen at the 2' carbon."],
                correct: 1,
                explanation: "Thymine is formed by the methylation of Uracil. They differ by the presence of a methyl group in Thymine and its absence in Uracil.",
                difficulty: "Moderate"
            },
            {
                id: 5,
                question: "In deoxyribonucleotides, the pentose sugar is 2-deoxy-D-ribose. Which carbon atom lacks a hydroxyl (-OH) group compared to ribose?",
                options: ["1' carbon", "2' carbon", "3' carbon", "5' carbon"],
                correct: 1,
                explanation: "The sugar in DNA is 2-deoxyribose, meaning the carbon at position 2' lacks a hydroxyl group (has only a hydrogen atom), unlike ribose in RNA.",
                difficulty: "Moderate"
            },
            {
                id: 6,
                question: "What molecule is formed when a purine or pyrimidine base covalently bonds to a ribose or deoxyribose sugar (without a phosphate)?",
                options: ["Nucleotide", "Nucleic acid", "Nucleoside", "Polynucleotide"],
                correct: 2,
                explanation: "A nucleoside is composed of a nitrogenous base covalently bonded to a sugar. If a phosphate group is added, it becomes a nucleotide.",
                difficulty: "Easy"
            },
            {
                id: 7,
                question: "Which of the following represents the correct nomenclature for a nucleoside containing guanine?",
                options: ["Guanylic acid", "Guanosine", "Guanidine", "Deoxyguanate"],
                correct: 1,
                explanation: "Nucleosides with purine bases have the suffix '-osine'. Therefore, guanine paired with a sugar is called Guanosine.",
                difficulty: "Moderate"
            },
            {
                id: 8,
                question: "How many replaceable H⁺ ions does each phosphate group have, which contribute to the acidic nature of DNA/RNA?",
                options: ["One", "Two", "Three", "Four"],
                correct: 2,
                explanation: "Each phosphate group has three replaceable H⁺ ions. Two are involved in phosphodiester bond formation, and one makes the DNA/RNA acidic.",
                difficulty: "Hard"
            },
            {
                id: 9,
                question: "Which bond connects the 3' carbon of one sugar to the 5' phosphate of an adjacent sugar in a polynucleotide?",
                options: ["Glycosidic bond", "Hydrogen bond", "Phosphodiester linkage", "Peptide bond"],
                correct: 2,
                explanation: "Nucleotides are joined by a 3',5' phosphodiester linkage, connecting the 3' carbon of one sugar to the 5' phosphate of an adjacent sugar.",
                difficulty: "Moderate"
            },
            {
                id: 10,
                question: "The formation of a phosphodiester bond involves the breakage of which phosphates from the incoming nucleotide triphosphate (NTP)?",
                options: ["α and β phosphates", "β and γ phosphates", "α and γ phosphates", "Only the γ phosphate"],
                correct: 1,
                explanation: "Bond formation involves the breakage of β and γ phosphates from the incoming NTP to provide energy for the enzyme-catalyzed reaction.",
                difficulty: "Hard"
            },
            {
                id: 11,
                question: "Which of the following is an exception to the rule that DNA mostly consists of two polynucleotide chains (double helix)?",
                options: ["Retroviruses", "Reoviruses", "Parvoviruses", "Bacteriophages"],
                correct: 2,
                explanation: "Parvoviruses are an exception because they contain single-stranded DNA (ssDNA).",
                difficulty: "Hard"
            },
            {
                id: 12,
                question: "Which RNA polymerase is responsible for transcribing pre-mRNA in eukaryotes?",
                options: ["RNA Polymerase I", "RNA Polymerase II", "RNA Polymerase III", "DNA Polymerase"],
                correct: 1,
                explanation: "RNA Polymerase II transcribes pre-mRNA in eukaryotes.",
                difficulty: "Moderate"
            },
            {
                id: 13,
                question: "What structural modification is found at the 5' end of mature eukaryotic mRNA?",
                options: ["Poly-A tail", "CCA sequence", "7-methylguanosine triphosphate cap", "Dihydrouracil loop"],
                correct: 2,
                explanation: "At the 5' end of eukaryotic mRNA, there is a 7-methylguanosine triphosphate (7-MeGTP) cap.",
                difficulty: "Moderate"
            },
            {
                id: 14,
                question: "Which type of RNA makes up approximately 15% of the total cellular RNA and acts as an adapter molecule?",
                options: ["mRNA", "tRNA", "rRNA", "snRNA"],
                correct: 1,
                explanation: "tRNA comprises about 15% of the total RNA in the cell and acts as an adapter molecule during protein synthesis.",
                difficulty: "Easy"
            },
            {
                id: 15,
                question: "In a tRNA molecule, which structural feature carries the sequence CCA at its 3' end?",
                options: ["Anticodon Arm", "D-arm", "TΨC arm", "Acceptor Arm"],
                correct: 3,
                explanation: "The Acceptor Arm is located at the 3' end, carries the amino acid, and contains the sequence CCA.",
                difficulty: "Moderate"
            },
            {
                id: 16,
                question: "If an mRNA codon sequence is UUU, what will be the corresponding complementary sequence on the anticodon arm of the tRNA?",
                options: ["AAA", "TTT", "CCC", "GGG"],
                correct: 0,
                explanation: "The anticodon arm recognizes the triplet codon in mRNA via complementary base pairing. UUU pairs with AAA.",
                difficulty: "Moderate"
            },
            {
                id: 17,
                question: "Which of the following is the most abundant type of RNA, comprising about 80% of total cellular RNA?",
                options: ["mRNA", "tRNA", "rRNA", "pre-mRNA"],
                correct: 2,
                explanation: "rRNA is the most abundant type of RNA, making up approximately 80% of total RNA in the cell.",
                difficulty: "Easy"
            },
            {
                id: 18,
                question: "Which specific small ribosomal RNA is transcribed by RNA Polymerase III instead of RNA Polymerase I?",
                options: ["5.8S rRNA", "18S rRNA", "28S rRNA", "5S rRNA"],
                correct: 3,
                explanation: "5S rRNA is a small ribosomal RNA component transcribed by RNA Polymerase III, whereas 5.8S, 18S, and 28S are transcribed by RNA Pol I.",
                difficulty: "Hard"
            },
            {
                id: 19,
                question: "Which nitrogenous base is referred to biochemically as 2-amino, 6-oxopurine?",
                options: ["Adenine", "Guanine", "Cytosine", "Thymine"],
                correct: 1,
                explanation: "Guanine is a purine base specifically described chemically as 2-amino, 6-oxopurine.",
                difficulty: "Hard"
            },
            {
                id: 20,
                question: "The presence of which atom group makes the RNA sugar more reactive and less chemically stable than DNA?",
                options: ["Phosphate group at 5'", "Nitrogen at N-9", "Hydroxyl (OH) group at 2' carbon", "Methyl group at C-5"],
                correct: 2,
                explanation: "RNA has a ribose sugar with a hydroxyl (OH) group attached to the 2' carbon. This additional oxygen atom makes it more reactive and less chemically stable than DNA.",
                difficulty: "Moderate"
            },
            {
                id: 21,
                question: "What is the primary function of mRNA in the cell?",
                options: ["Structural core of ribosomes", "Acts as a template for protein synthesis", "Adapter molecule carrying amino acids", "Stores genetic information permanently"],
                correct: 1,
                explanation: "mRNA acts as a template for protein synthesis, carrying genetic information from DNA to ribosomes to specify the amino acid sequence.",
                difficulty: "Easy"
            },
            {
                id: 22,
                question: "Which virus is an exception to the standard structure of RNA by possessing double-stranded RNA (dsRNA)?",
                options: ["Retroviruses", "Bacteriophages", "Reoviruses", "Parvoviruses"],
                correct: 2,
                explanation: "Reoviruses are an exception because they contain double-stranded RNA (dsRNA), whereas RNA is mostly single-stranded.",
                difficulty: "Moderate"
            },
            {
                id: 23,
                question: "During RNA processing in eukaryotes, what is the process called where introns are removed and exons are joined together?",
                options: ["Translation", "Replication", "Splicing", "Capping"],
                correct: 2,
                explanation: "Splicing occurs in eukaryotic mRNA only, where non-coding introns are removed, and coding exons are joined to yield mature mRNA.",
                difficulty: "Moderate"
            },
            {
                id: 24,
                question: "Which arm of the tRNA molecule contains modified uridine and is primarily involved in the binding of tRNA to the ribosome?",
                options: ["D-arm", "Anticodon Arm", "TΨC arm", "Acceptor Arm"],
                correct: 2,
                explanation: "The TΨC arm contains modified uridine and is involved in the binding of tRNA to the ribosome.",
                difficulty: "Hard"
            },
            {
                id: 25,
                question: "What is the structure called when many ribosomes work on the same mRNA molecule simultaneously (typically 80-100 nucleotides apart)?",
                options: ["Nucleosome", "Polysome", "Spliceosome", "Ribozyme"],
                correct: 1,
                explanation: "Many ribosomes can translate the same mRNA simultaneously to efficiently produce proteins. This entire structure is called a polysome.",
                difficulty: "Moderate"
            },
            {
                id: 26,
                question: "Which nitrogenous base is present in DNA but rarely found in RNA?",
                options: ["Adenine", "Guanine", "Cytosine", "Thymine"],
                correct: 3,
                explanation: "Thymine is exclusively found in DNA. Uracil is rarely found in DNA as it is converted to Thymine to increase genetic stability.",
                difficulty: "Easy"
            },
            {
                id: 27,
                question: "In the nomenclature of nucleosides, what suffix is used for those containing pyrimidine bases?",
                options: ["-osine", "-idine", "-ic acid", "-ate"],
                correct: 1,
                explanation: "Pyrimidine nucleosides end with the suffix '-idine' (e.g., Cytidine, Uridine, Thymidine).",
                difficulty: "Moderate"
            },
            {
                id: 28,
                question: "A nucleoside plus three phosphate groups is termed a nucleoside triphosphate (NTP). An example is:",
                options: ["Adenosine Monophosphate", "Guanosine", "Adenosine Triphosphate (ATP)", "Deoxythymidine"],
                correct: 2,
                explanation: "Adenosine + 3 Pi forms Adenosine Triphosphate (ATP), which is a nucleoside triphosphate.",
                difficulty: "Moderate"
            },
            {
                id: 29,
                question: "Which specific enzyme transcribes tRNA?",
                options: ["RNA Polymerase I", "RNA Polymerase II", "RNA Polymerase III", "Reverse Transcriptase"],
                correct: 2,
                explanation: "tRNA is transcribed by RNA Polymerase III.",
                difficulty: "Moderate"
            },
            {
                id: 30,
                question: "The D-arm (DHU arm) of a tRNA molecule contains dihydrouracil. What is its primary function?",
                options: ["Binds to the mRNA codon", "Carries the specific amino acid", "Binds to the ribosome", "Acts as a recognition site for aminoacyl-tRNA synthetase"],
                correct: 3,
                explanation: "The D-arm contains dihydrouracil and serves as a recognition site for aminoacyl-tRNA synthetase, the enzyme that attaches the amino acid to the tRNA.",
                difficulty: "Hard"
            }
        ];

        // --- COMPONENTS ---

        const Icons = {
            BookOpen: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>,
            User: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>,
            Clock: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>,
            CheckCircle: () => <svg className="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>,
            XCircle: () => <svg className="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>,
            Download: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>,
            ShieldCheck: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>,
        };

        const TopBar = () => (
            <div className="bg-white border-b border-gray-200 sticky top-0 z-50">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="flex justify-between items-center h-16">
                        <div className="flex items-center gap-3">
                            <div className="bg-brand-600 text-white p-2 rounded-lg">
                                <Icons.BookOpen />
                            </div>
                            <div>
                                <h1 className="text-xl font-bold text-gray-900 tracking-tight leading-none">Capital Coaching Academy (CCA)</h1>
                                <p className="text-xs text-brand-600 font-semibold mt-1">Instructor: Sir Jawad</p>
                            </div>
                        </div>
                        <div className="hidden md:flex items-center text-sm font-medium text-gray-500">
                            <Icons.ShieldCheck />
                            <span className="ml-1">Secure MDCAT Portal</span>
                        </div>
                    </div>
                </div>
            </div>
        );

        // --- MAIN APP ---
        const App = () => {
            const [screen, setScreen] = useState('landing'); // landing, register, quiz, result, review
            const [studentData, setStudentData] = useState({ name: '', fatherName: '' });
            const [answers, setAnswers] = useState(new Array(quizQuestions.length).fill(null));
            const [currentQ, setCurrentQ] = useState(0);
            const [timeRemaining, setTimeRemaining] = useState(30 * 60); // 30 minutes
            const [showSubmitModal, setShowSubmitModal] = useState(false); // NEW STATE FOR MODAL
            
            // Timer logic
            useEffect(() => {
                let timer;
                if (screen === 'quiz' && timeRemaining > 0) {
                    timer = setInterval(() => {
                        setTimeRemaining(prev => {
                            if (prev <= 1) {
                                clearInterval(timer);
                                handleQuizSubmit();
                                return 0;
                            }
                            return prev - 1;
                        });
                    }, 1000);
                }
                return () => clearInterval(timer);
            }, [screen, timeRemaining]);

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                const s = (seconds % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            };

            const handleQuizSubmit = () => {
                setScreen('result');
            };

            // Helper to prevent jsPDF from crashing on special scientific characters
            const sanitizeForPDF = (text) => {
                if (!text) return "";
                return text.toString()
                    .replace(/α/g, 'alpha')
                    .replace(/β/g, 'beta')
                    .replace(/γ/g, 'gamma')
                    .replace(/Ψ/g, 'Psi')
                    .replace(/⁺/g, '+');
            };

            // PDF Generators
            const generatePracticePDF = () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                doc.setFont("helvetica", "bold");
                doc.setFontSize(18);
                doc.setTextColor(2, 132, 199); // Brand 600
                doc.text("Capital Coaching Academy (CCA)", 105, 20, { align: 'center' });
                
                doc.setFontSize(14);
                doc.setTextColor(51, 65, 85);
                doc.text("Biology MDCAT - Practice Quiz Booklet", 105, 28, { align: 'center' });
                
                doc.setFontSize(12);
                doc.setFont("helvetica", "normal");
                doc.text("Instructor: Sir Jawad", 105, 35, { align: 'center' });
                doc.text(`Topic: Nucleotides & RNA | Total MCQs: 30`, 105, 42, { align: 'center' });
                
                doc.line(20, 48, 190, 48);

                let y = 55;
                
                quizQuestions.forEach((q, index) => {
                    if (y > 270) { doc.addPage(); y = 20; }
                    
                    doc.setFont("helvetica", "bold");
                    doc.setFontSize(11);
                    // Split question text if too long
                    const splitTitle = doc.splitTextToSize(`${index + 1}. ${sanitizeForPDF(q.question)}`, 170);
                    doc.text(splitTitle, 20, y);
                    y += (splitTitle.length * 6) + 2;

                    doc.setFont("helvetica", "normal");
                    doc.setFontSize(10);
                    q.options.forEach((opt, oIdx) => {
                        if (y > 280) { doc.addPage(); y = 20; }
                        const optionLetter = String.fromCharCode(65 + oIdx);
                        const splitOpt = doc.splitTextToSize(`${optionLetter}) ${sanitizeForPDF(opt)}`, 160);
                        doc.text(splitOpt, 25, y);
                        y += (splitOpt.length * 5) + 2;
                    });
                    y += 4; // Space between questions
                });

                // Answer Key Section
                doc.addPage();
                doc.setFont("helvetica", "bold");
                doc.setFontSize(16);
                doc.setTextColor(2, 132, 199);
                doc.text("Answer Key & Discussion", 105, 20, { align: 'center' });
                
                const tableData = quizQuestions.map((q, i) => [
                    i + 1,
                    String.fromCharCode(65 + q.correct),
                    sanitizeForPDF(q.explanation)
                ]);

                doc.autoTable({
                    startY: 30,
                    head: [['Q#', 'Key', 'Discussion / Concept']],
                    body: tableData,
                    headStyles: { fillColor: [2, 132, 199], textColor: 255 },
                    styles: { fontSize: 9, cellPadding: 3 },
                    columnStyles: {
                        0: { cellWidth: 15, halign: 'center' },
                        1: { cellWidth: 15, halign: 'center' },
                        2: { cellWidth: 'auto' }
                    }
                });

                doc.save("CCA_Practice_Booklet.pdf");
            };

            const generateResultPDF = () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                const correctCount = answers.filter((a, i) => a === quizQuestions[i].correct).length;
                const skippedCount = answers.filter(a => a === null).length;
                const percentage = ((correctCount / quizQuestions.length) * 100).toFixed(1);

                // Header
                doc.setFont("helvetica", "bold");
                doc.setFontSize(18);
                doc.setTextColor(2, 132, 199);
                doc.text("Capital Coaching Academy (CCA)", 105, 20, { align: 'center' });
                doc.setFontSize(14);
                doc.setTextColor(51, 65, 85);
                doc.text("Official Biology MDCAT Result Report", 105, 28, { align: 'center' });
                
                doc.setFont("helvetica", "normal");
                doc.setFontSize(11);
                doc.text(`Instructor: Sir Jawad`, 105, 35, { align: 'center' });
                doc.line(20, 42, 190, 42);

                // Student Details
                doc.setFontSize(12);
                doc.text(`Student Name: ${studentData.name}`, 20, 52);
                doc.text(`Father's Name: ${studentData.fatherName}`, 20, 60);
                doc.text(`Date: ${new Date().toLocaleDateString()}`, 140, 52);
                doc.text(`Topic: Nucleotides & RNA`, 140, 60);

                // Score Box
                doc.setFillColor(240, 249, 255);
                doc.setDrawColor(2, 132, 199);
                doc.rect(20, 70, 170, 25, 'FD');
                doc.setFont("helvetica", "bold");
                doc.setTextColor(2, 132, 199);
                doc.text(`Score: ${correctCount} / 30`, 30, 85);
                doc.text(`Percentage: ${percentage}%`, 130, 85);

                // Question by Question Review Table
                const reviewData = quizQuestions.map((q, i) => {
                    const studentAns = answers[i] !== null ? String.fromCharCode(65 + answers[i]) : "Skipped";
                    const correctAns = String.fromCharCode(65 + q.correct);
                    const status = answers[i] === q.correct ? "Correct" : (answers[i] === null ? "Skipped" : "Incorrect");
                    return [i + 1, studentAns, correctAns, status, sanitizeForPDF(q.explanation)];
                });

                doc.autoTable({
                    startY: 105,
                    head: [['Q#', 'Your Ans', 'Key', 'Status', 'Explanation']],
                    body: reviewData,
                    headStyles: { fillColor: [2, 132, 199], textColor: 255 },
                    styles: { fontSize: 8, cellPadding: 2 },
                    columnStyles: {
                        0: { cellWidth: 10 },
                        1: { cellWidth: 15 },
                        2: { cellWidth: 10 },
                        3: { cellWidth: 18, fontStyle: 'bold' },
                        4: { cellWidth: 'auto' }
                    },
                    didParseCell: function(data) {
                        if (data.section === 'body' && data.column.index === 3) {
                            if (data.cell.raw === 'Correct') data.cell.styles.textColor = [34, 197, 94]; // Green
                            else if (data.cell.raw === 'Incorrect') data.cell.styles.textColor = [239, 68, 68]; // Red
                            else data.cell.styles.textColor = [156, 163, 175]; // Gray
                        }
                    }
                });

                doc.save(`CCA_Result_${studentData.name.replace(/\s+/g, '_')}.pdf`);
            };

            // Screens Renderers
            const renderLanding = () => (
                <div className="min-h-[calc(100vh-64px)] flex flex-col items-center justify-center p-6 text-center animate-fade-in">
                    <div className="max-w-3xl glass-panel p-10 rounded-2xl shadow-xl">
                        <div className="inline-block p-4 bg-brand-100 rounded-full mb-6">
                            <Icons.BookOpen className="w-12 h-12 text-brand-600" />
                        </div>
                        <h1 className="text-4xl font-extrabold text-gray-900 mb-4 tracking-tight">Biology MDCAT Portal</h1>
                        <p className="text-xl text-gray-600 mb-8 max-w-2xl mx-auto">
                            Welcome to the official online testing portal for Capital Coaching Academy (CCA). Prepare with academy-standard conceptual MCQs structured by Sir Jawad.
                        </p>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10 max-w-xl mx-auto text-left">
                            <div className="bg-white p-5 rounded-xl border border-gray-100 shadow-sm flex items-start gap-4">
                                <div className="bg-cyan-50 p-2 rounded-lg text-cyan-600"><Icons.Clock /></div>
                                <div>
                                    <h3 className="font-semibold text-gray-900">30 Minutes</h3>
                                    <p className="text-sm text-gray-500">Timed strictly to exam patterns</p>
                                </div>
                            </div>
                            <div className="bg-white p-5 rounded-xl border border-gray-100 shadow-sm flex items-start gap-4">
                                <div className="bg-brand-50 p-2 rounded-lg text-brand-600"><Icons.BookOpen /></div>
                                <div>
                                    <h3 className="font-semibold text-gray-900">30 Questions</h3>
                                    <p className="text-sm text-gray-500">Conceptual & Syllabus based</p>
                                </div>
                            </div>
                        </div>

                        <div className="flex flex-col sm:flex-row gap-4 justify-center">
                            <button 
                                onClick={() => setScreen('register')}
                                className="bg-brand-600 hover:bg-brand-700 text-white font-semibold py-3 px-8 rounded-xl transition-all shadow-md hover:shadow-lg flex items-center justify-center gap-2 text-lg"
                            >
                                Start Live Quiz
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                            <button 
                                onClick={generatePracticePDF}
                                className="bg-white border-2 border-brand-600 text-brand-600 hover:bg-brand-50 font-semibold py-3 px-8 rounded-xl transition-all shadow-sm hover:shadow flex items-center justify-center gap-2 text-lg"
                            >
                                <Icons.Download />
                                Practice PDF Booklet
                            </button>
                        </div>
                    </div>
                </div>
            );

            const renderRegister = () => (
                <div className="min-h-[calc(100vh-64px)] flex flex-col items-center justify-center p-6">
                    <div className="max-w-md w-full glass-panel p-8 rounded-2xl shadow-xl">
                        <div className="text-center mb-8">
                            <h2 className="text-2xl font-bold text-gray-900">Student Registration</h2>
                            <p className="text-gray-500 text-sm mt-2">Enter your details to begin the assessment.</p>
                        </div>
                        <form onSubmit={(e) => {
                            e.preventDefault();
                            if(studentData.name.trim() && studentData.fatherName.trim()) setScreen('quiz');
                        }} className="space-y-6">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                                <div className="relative">
                                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                                        <Icons.User />
                                    </div>
                                    <input 
                                        type="text" 
                                        required 
                                        value={studentData.name}
                                        onChange={(e) => setStudentData({...studentData, name: e.target.value})}
                                        className="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-xl focus:ring-brand-500 focus:border-brand-500 bg-white" 
                                        placeholder="Enter your name" 
                                    />
                                </div>
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Father's Name</label>
                                <div className="relative">
                                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                                        <Icons.User />
                                    </div>
                                    <input 
                                        type="text" 
                                        required 
                                        value={studentData.fatherName}
                                        onChange={(e) => setStudentData({...studentData, fatherName: e.target.value})}
                                        className="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-xl focus:ring-brand-500 focus:border-brand-500 bg-white" 
                                        placeholder="Enter father's name" 
                                    />
                                </div>
                            </div>
                            <button 
                                type="submit" 
                                className="w-full bg-brand-600 hover:bg-brand-700 text-white font-semibold py-3 px-4 rounded-xl transition-all shadow-md"
                            >
                                Continue to Quiz
                            </button>
                        </form>
                    </div>
                </div>
            );

            const renderQuiz = () => {
                const q = quizQuestions[currentQ];
                
                return (
                    <div className="max-w-6xl mx-auto p-4 sm:p-6 lg:p-8 min-h-[calc(100vh-64px)] flex flex-col md:flex-row gap-6">
                        {/* Main Quiz Area */}
                        <div className="flex-1 flex flex-col">
                            {/* Quiz Header & Progress */}
                            <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 mb-6 flex justify-between items-center">
                                <div>
                                    <span className="text-sm font-bold text-gray-400 uppercase tracking-wider">Question {currentQ + 1} of {quizQuestions.length}</span>
                                    <div className="text-xs text-brand-600 font-semibold mt-1 bg-brand-50 px-2 py-1 rounded-md inline-block">{q.difficulty} Level</div>
                                </div>
                                <div className="flex items-center gap-2 bg-slate-50 px-4 py-2 rounded-lg border border-slate-200">
                                    <Icons.Clock className={timeRemaining < 300 ? "text-red-500 animate-pulse" : "text-gray-500"} />
                                    <span className={`font-mono text-lg font-bold ${timeRemaining < 300 ? "text-red-600" : "text-gray-700"}`}>
                                        {formatTime(timeRemaining)}
                                    </span>
                                </div>
                            </div>

                            <div className="w-full bg-gray-200 rounded-full h-1.5 mb-8">
                                <div className="bg-brand-500 h-1.5 rounded-full transition-all duration-300" style={{ width: `${((currentQ + 1) / quizQuestions.length) * 100}%` }}></div>
                            </div>

                            {/* Question Card */}
                            <div className="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 flex-1 mb-6">
                                <h2 className="text-xl md:text-2xl font-semibold text-gray-800 mb-8 leading-snug scientific-text">
                                    {q.question}
                                </h2>

                                <div className="space-y-4">
                                    {q.options.map((opt, idx) => {
                                        const isSelected = answers[currentQ] === idx;
                                        return (
                                            <div 
                                                key={idx}
                                                onClick={() => {
                                                    const newAnswers = [...answers];
                                                    newAnswers[currentQ] = idx;
                                                    setAnswers(newAnswers);
                                                }}
                                                className={`p-5 rounded-xl border-2 cursor-pointer transition-all duration-200 flex items-center group
                                                    ${isSelected 
                                                        ? 'border-brand-500 bg-brand-50 ring-4 ring-brand-500/10' 
                                                        : 'border-gray-200 hover:border-brand-300 hover:bg-gray-50'
                                                    }`}
                                            >
                                                <div className={`w-8 h-8 rounded-full border-2 flex items-center justify-center mr-4 transition-colors font-semibold
                                                    ${isSelected ? 'border-brand-500 bg-brand-500 text-white' : 'border-gray-300 text-gray-500 group-hover:border-brand-300'}`}>
                                                    {String.fromCharCode(65 + idx)}
                                                </div>
                                                <span className={`text-lg scientific-text ${isSelected ? 'text-brand-900 font-medium' : 'text-gray-700'}`}>
                                                    {opt}
                                                </span>
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>

                            {/* Navigation */}
                            <div className="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                                <button 
                                    onClick={() => setCurrentQ(Math.max(0, currentQ - 1))}
                                    disabled={currentQ === 0}
                                    className="px-6 py-3 rounded-xl font-medium text-gray-600 hover:bg-gray-100 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                                >
                                    Previous
                                </button>
                                
                                {currentQ === quizQuestions.length - 1 ? (
                                    <button 
                                        onClick={() => setShowSubmitModal(true)}
                                        className="px-8 py-3 rounded-xl font-bold text-white bg-green-500 hover:bg-green-600 transition-colors shadow-md"
                                    >
                                        Submit Quiz
                                    </button>
                                ) : (
                                    <button 
                                        onClick={() => setCurrentQ(Math.min(quizQuestions.length - 1, currentQ + 1))}
                                        className="px-8 py-3 rounded-xl font-semibold text-white bg-brand-600 hover:bg-brand-700 transition-colors shadow-md"
                                    >
                                        Next
                                    </button>
                                )}
                            </div>
                        </div>

                        {/* Navigator Grid */}
                        <div className="w-full md:w-72 bg-white p-5 rounded-2xl shadow-sm border border-gray-100 h-fit sticky top-24">
                            <h3 className="font-bold text-gray-800 mb-4 flex justify-between items-center">
                                Navigator
                                <span className="text-xs bg-gray-100 px-2 py-1 rounded-md text-gray-600">{answers.filter(a=>a!==null).length}/{quizQuestions.length}</span>
                            </h3>
                            <div className="grid grid-cols-5 gap-2">
                                {quizQuestions.map((_, idx) => {
                                    const isAttempted = answers[idx] !== null;
                                    const isCurrent = currentQ === idx;
                                    return (
                                        <button
                                            key={idx}
                                            onClick={() => setCurrentQ(idx)}
                                            className={`h-10 w-full rounded-lg text-sm font-semibold transition-all
                                                ${isCurrent ? 'ring-2 ring-brand-600 ring-offset-2' : ''}
                                                ${isAttempted ? 'bg-brand-100 text-brand-700 border border-brand-200' : 'bg-gray-50 text-gray-500 border border-gray-200 hover:bg-gray-100'}
                                            `}
                                        >
                                            {idx + 1}
                                        </button>
                                    )
                                })}
                            </div>
                            <div className="mt-6 space-y-2 text-sm text-gray-600">
                                <div className="flex items-center gap-2"><div className="w-3 h-3 rounded bg-brand-100 border border-brand-200"></div> Attempted</div>
                                <div className="flex items-center gap-2"><div className="w-3 h-3 rounded bg-gray-50 border border-gray-200"></div> Unattempted</div>
                            </div>
                            
                            {/* Direct Submission Button */}
                            <button 
                                onClick={() => setShowSubmitModal(true)}
                                className="mt-8 w-full bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 font-bold py-3 px-4 rounded-xl transition-all shadow-sm flex items-center justify-center gap-2"
                            >
                                <Icons.CheckCircle /> Direct Submit
                            </button>
                        </div>
                        
                        {/* Custom Submit Modal */}
                        {showSubmitModal && (
                            <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                                <div className="bg-white rounded-2xl p-8 max-w-md w-full shadow-2xl">
                                    <div className="flex items-center gap-3 mb-4 text-red-500">
                                        <Icons.ShieldCheck />
                                        <h3 className="text-2xl font-bold text-gray-900">Submit Quiz?</h3>
                                    </div>
                                    <p className="text-gray-600 mb-6 leading-relaxed">
                                        You have answered <strong className="text-gray-900">{answers.filter(a => a !== null).length}</strong> out of <strong className="text-gray-900">{quizQuestions.length}</strong> questions.
                                        Are you sure you want to submit? You cannot change your answers after submission.
                                    </p>
                                    <div className="flex justify-end gap-3">
                                        <button 
                                            onClick={() => setShowSubmitModal(false)}
                                            className="px-5 py-2.5 rounded-xl font-medium text-gray-700 bg-gray-100 hover:bg-gray-200 transition-colors"
                                        >
                                            Continue Attempting
                                        </button>
                                        <button 
                                            onClick={() => {
                                                setShowSubmitModal(false);
                                                handleQuizSubmit();
                                            }}
                                            className="px-5 py-2.5 rounded-xl font-bold text-white bg-brand-600 hover:bg-brand-700 transition-colors shadow-md"
                                        >
                                            Yes, Submit Now
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            const renderResult = () => {
                const correctCount = answers.filter((a, i) => a === quizQuestions[i].correct).length;
                const skippedCount = answers.filter(a => a === null).length;
                const incorrectCount = quizQuestions.length - correctCount - skippedCount;
                const percentage = Math.round((correctCount / quizQuestions.length) * 100);
                
                let remarks = "";
                let colorClass = "";
                if (percentage >= 90) { remarks = "Outstanding Performance! Excellent conceptual clarity."; colorClass = "text-green-600"; }
                else if (percentage >= 70) { remarks = "Good Effort! You have a solid grasp of the concepts."; colorClass = "text-brand-600"; }
                else if (percentage >= 50) { remarks = "Needs Improvement. Review the lecture notes and Practice PDF."; colorClass = "text-yellow-600"; }
                else { remarks = "Critical! Please consult Sir Jawad for a revision strategy."; colorClass = "text-red-600"; }

                return (
                    <div className="min-h-[calc(100vh-64px)] flex flex-col items-center p-6 py-12 animate-fade-in">
                        <div className="max-w-4xl w-full bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
                            
                            {/* Header Section */}
                            <div className="bg-brand-600 p-8 text-center text-white">
                                <h1 className="text-3xl font-bold mb-2">Performance Dashboard</h1>
                                <p className="opacity-90">Capital Coaching Academy (CCA)</p>
                            </div>

                            <div className="p-8 md:p-12">
                                {/* Student Info */}
                                <div className="flex flex-wrap justify-between items-center bg-gray-50 p-6 rounded-2xl mb-8 border border-gray-100">
                                    <div>
                                        <p className="text-sm text-gray-500 uppercase font-semibold">Student</p>
                                        <p className="text-xl font-bold text-gray-900">{studentData.name}</p>
                                        <p className="text-sm text-gray-600">S/O {studentData.fatherName}</p>
                                    </div>
                                    <div className="text-right mt-4 md:mt-0">
                                        <p className="text-sm text-gray-500 uppercase font-semibold">Subject</p>
                                        <p className="text-lg font-bold text-gray-900">Biology MDCAT</p>
                                        <p className="text-sm text-gray-600">Instructor: Sir Jawad</p>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-12 items-center mb-12">
                                    {/* Circular Chart */}
                                    <div className="flex flex-col items-center justify-center">
                                        <div className="relative w-48 h-48">
                                            <svg className="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                                                <path
                                                    className="text-gray-100"
                                                    strokeWidth="3"
                                                    stroke="currentColor"
                                                    fill="none"
                                                    d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"
                                                />
                                                <path
                                                    className={`${percentage >= 50 ? 'text-green-500' : 'text-red-500'} drop-shadow-md`}
                                                    strokeDasharray={`${percentage}, 100`}
                                                    strokeWidth="3"
                                                    strokeLinecap="round"
                                                    stroke="currentColor"
                                                    fill="none"
                                                    d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"
                                                />
                                            </svg>
                                            <div className="absolute inset-0 flex flex-col items-center justify-center">
                                                <span className="text-5xl font-extrabold text-gray-800">{percentage}%</span>
                                            </div>
                                        </div>
                                        <p className={`mt-6 text-center font-bold text-lg ${colorClass}`}>{remarks}</p>
                                    </div>

                                    {/* Stats Grid */}
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-blue-50 p-6 rounded-2xl border border-blue-100 text-center">
                                            <p className="text-blue-500 text-sm font-bold uppercase">Total MCQs</p>
                                            <p className="text-3xl font-black text-blue-900 mt-1">{quizQuestions.length}</p>
                                        </div>
                                        <div className="bg-green-50 p-6 rounded-2xl border border-green-100 text-center">
                                            <p className="text-green-600 text-sm font-bold uppercase">Correct</p>
                                            <p className="text-3xl font-black text-green-900 mt-1">{correctCount}</p>
                                        </div>
                                        <div className="bg-red-50 p-6 rounded-2xl border border-red-100 text-center">
                                            <p className="text-red-500 text-sm font-bold uppercase">Incorrect</p>
                                            <p className="text-3xl font-black text-red-900 mt-1">{incorrectCount}</p>
                                        </div>
                                        <div className="bg-gray-50 p-6 rounded-2xl border border-gray-200 text-center">
                                            <p className="text-gray-500 text-sm font-bold uppercase">Skipped</p>
                                            <p className="text-3xl font-black text-gray-700 mt-1">{skippedCount}</p>
                                        </div>
                                    </div>
                                </div>

                                {/* Actions */}
                                <div className="flex flex-col sm:flex-row gap-4 justify-center pt-8 border-t border-gray-100">
                                    <button 
                                        onClick={() => setScreen('review')}
                                        className="bg-brand-600 hover:bg-brand-700 text-white font-semibold py-3 px-8 rounded-xl transition-all shadow-md flex items-center justify-center gap-2"
                                    >
                                        <Icons.BookOpen /> Review Answers
                                    </button>
                                    <button 
                                        onClick={generateResultPDF}
                                        className="bg-white border-2 border-brand-600 text-brand-600 hover:bg-brand-50 font-semibold py-3 px-8 rounded-xl transition-all shadow-sm flex items-center justify-center gap-2"
                                    >
                                        <Icons.Download /> Download Result PDF
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderReview = () => {
                return (
                    <div className="max-w-4xl mx-auto p-4 sm:p-6 py-10 min-h-[calc(100vh-64px)]">
                        <div className="flex justify-between items-center mb-8 bg-white p-4 rounded-xl shadow-sm border border-gray-200 sticky top-20 z-40">
                            <div>
                                <h2 className="text-2xl font-bold text-gray-900">Review Answers</h2>
                                <p className="text-gray-500 text-sm">Detailed explanations by Sir Jawad</p>
                            </div>
                            <button 
                                onClick={() => setScreen('result')}
                                className="bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2 px-6 rounded-lg transition-colors"
                            >
                                Back to Result
                            </button>
                        </div>

                        <div className="space-y-6">
                            {quizQuestions.map((q, idx) => {
                                const studentAns = answers[idx];
                                const isCorrect = studentAns === q.correct;
                                const isSkipped = studentAns === null;

                                return (
                                    <div key={idx} className={`bg-white rounded-2xl shadow-sm border-l-4 overflow-hidden
                                        ${isCorrect ? 'border-green-500' : (isSkipped ? 'border-gray-400' : 'border-red-500')}
                                    `}>
                                        <div className="p-6">
                                            <div className="flex items-start gap-4 mb-6">
                                                <span className="flex-shrink-0 w-8 h-8 bg-gray-100 text-gray-700 rounded-full flex items-center justify-center font-bold text-sm">
                                                    {idx + 1}
                                                </span>
                                                <h3 className="text-lg font-semibold text-gray-800 leading-snug scientific-text pt-1">{q.question}</h3>
                                            </div>

                                            <div className="grid grid-cols-1 gap-3 ml-12 mb-6">
                                                {q.options.map((opt, oIdx) => {
                                                    let optStyle = "border-gray-200 text-gray-600 bg-gray-50";
                                                    let icon = null;

                                                    if (oIdx === q.correct) {
                                                        optStyle = "border-green-500 bg-green-50 text-green-800 font-medium ring-1 ring-green-500";
                                                        icon = <Icons.CheckCircle />;
                                                    } else if (oIdx === studentAns && !isCorrect) {
                                                        optStyle = "border-red-500 bg-red-50 text-red-800 ring-1 ring-red-500";
                                                        icon = <Icons.XCircle />;
                                                    }

                                                    return (
                                                        <div key={oIdx} className={`p-4 rounded-xl border flex justify-between items-center ${optStyle}`}>
                                                            <div className="flex items-center gap-3">
                                                                <span className="font-bold w-6">{String.fromCharCode(65 + oIdx)}.</span>
                                                                <span className="scientific-text">{opt}</span>
                                                            </div>
                                                            {icon}
                                                        </div>
                                                    )
                                                })}
                                            </div>

                                            <div className="ml-12 bg-blue-50 border border-blue-100 rounded-xl p-5">
                                                <h4 className="text-blue-800 font-bold mb-2 flex items-center gap-2">
                                                    <Icons.BookOpen /> Concept Discussion
                                                </h4>
                                                <p className="text-blue-900 text-sm leading-relaxed">{q.explanation}</p>
                                            </div>
                                        </div>
                                    </div>
                                )
                            })}
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <TopBar />
                    <main className="flex-1">
                        {screen === 'landing' && renderLanding()}
                        {screen === 'register' && renderRegister()}
                        {screen === 'quiz' && renderQuiz()}
                        {screen === 'result' && renderResult()}
                        {screen === 'review' && renderReview()}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
